<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <title>세스코</title>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  		
		<link rel="stylesheet"  th:href="@{/jqwidgets/styles/jqx.base.css}" />
		<link rel="stylesheet"  th:href="@{/jqwidgets/styles/jqx.arctic.css}" />
		<link rel="stylesheet"  th:href="@{/css/import.css}" />

		<script type="text/javascript" th:src="@{/js/vue.js}"></script>
		<script type="text/javascript" th:src="@{/js/axios.min.js}"></script>
		<script type="text/javascript" th:src="@{/js/jquery.min.js}"></script>
		<script type="text/javascript" th:src="@{/js/babel.min.js}"></script>
		<script type="text/javascript" th:src="@{/js/es6-promise.min.js}"></script>
		<script type="text/javascript" th:src="@{/js/polyfill.min.js}"></script>
		<script type="text/javascript" th:src="@{/js/vue-select.js}"></script>
		<script type="text/javascript" th:src="@{/js/moment.min.js}"></script>
		<script type="text/javascript" th:src="@{/js/highstock.js}"></script>
		<script type="text/javascript" th:src="@{/js/act_common.js}"></script>
		<script type="text/javascript" th:src="@{/js/common.js}"></script>
		<script type="text/javascript" th:src="@{/js/jquery-ui.min.js}"></script>
		<script type="text/javascript" th:src="@{/js/input.js}"></script>
		<script type="text/javascript" th:src="@{/js/jquery.mtz.monthpicker.js}"></script>

		<script type="text/javascript" th:src="@{/jqwidgets/jqx-all.js}"></script>
		<script type="text/javascript" th:src="@{/jqwidgets/jqxcore.js}"></script>

		<script th:inline="javascript">
			var menuBase = window.location.href.split('/')[3];
			window.onload = function () {
			}
			$(document).ready(function(){
				$( "#opener" ).on( "click", function() {
					$( "#dialog" ).show();
					$( "#dialog" ).dialog( "open" );
				});
	
				$( "#dialog .js-pop-close" ).on( "click", function() {
					$( "#dialog" ).hide();
					$( "#dialog" ).dialog( "close" );
					history.back();
				});
				
				if(menuBase != undefined){
					if(menuBase == 'fs'){
						$("#layoutWrap").addClass("main");
					} else {
						$("#layoutWrap").removeClass("main");
					}
				}
				// $('#headers').hide()
			});

		</script>

</head>
<body>
	<div class="wrap" id="layoutWrap">
		<div class="wrapInner" >
			<header th:replace="~{layout/header :: header}">
			  <p>header.html header section</p>
			</header>
			<container th:replace="~{layout/container:: container}">
			  <p>container.html container section</p>
			</container>
		</div>
		<footer th:replace="~{layout/footer :: footer}">
		  <p>footer.html footer section</p>
		</footer>
	</div>
	<div id="dialog" title="Basic dialog" style="display: none;">
			<div class="layer-pop-wrap">
					<div class="layer-pop-box smallAlert">
							<div class="pop-wrap">
									<h5 class="blind">시스템 문구</h5>
									<header class="pop-header">
											<div class="pop-header-title-wrap">
													<h6 class="pop-header-title">시스템 문구</h6>
													<button class="btn-pop-close js-pop-close">닫기</button>
											</div>
									</header>
									<div class="pop-container">
										<div class="pop-common-box">
											<!-- <h5>작업 진행 중......</h5> -->
											<h3>필수 데이터가 없습니다.확인 후 다시 진입하세요.</h3>
										</div>
									</div>
									<div class="pop-bottom" style="margin-top: auto">
											<div class="pop-btn-box">
													<a href="#" class="btn-pop-bottom js-pop-close">취소</a>
													<a href="#" class="btn-pop-bottom js-pop-close">확인</a>
											</div>
									</div>
							</div>
					</div>
			</div>
	</div>
	<button id="opener">Open Dialog</button>

	<!-- alert confirm -->
	<div th:replace="~{common/popup/alertPopup}"></div>

	<!-- loading -->
	<div class="layer-pop-wrap loading" style="display:none;">
		<div class="spinnerWrap">
			<img class="spinner" th:src="@{/images/common/img_loading01.png}"/>
		</div>
	</div>
</body>
</html>
