server:  
  servlet:    
    session:      
      timeout: 1800
mybatis:
  mapper-locations: mybatis/mapper/**/*.xml

################################
# LOGGING
#################################
logging:
   pattern:
      console: '%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%4line]){magenta} %clr(%-40.40logger{39}){cyan} %clr(:){red} %m%n%wEx'
   level:
      root: info
      aicluster: debug
      jdbc:
         resultset: error
         audit: error
      
#################################
# 환경설정
#################################
env:
   cors:
      origins:
        #  - "localhost:8081"
         - "localhost:8080"
      headers:
         - "Content-Disposition"
         - "Content-Language"
         - "Content-Transfer-Encoding"
         - "Content-Type"
      methods:
         - "*"
      pattern: "/**"
   cookie: 
      # domain: "cesco.or.kr"
      #max-age = jwt.refreshTokenExpireTime / 1000 이어야 한다.
      max-age: 1800
      secure: false
      httpOnly: true
      path: "/"
   dir:
      core-log: "C:/aica/logs/core-logs"
      upload: "C:/aica/upload"


