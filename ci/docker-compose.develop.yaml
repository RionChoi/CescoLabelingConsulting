version: '3.5'

services:
  cesnetapisrv:
    image: cesdocker.cesco.biz:12000/develop/cescodemo/cescodemo:latest
    hostname: "{{.Service.Name}}-{{.Task.Slot}}"
    networks: 
      - backend
      - proxy
    ports:
      - "19010:8080"
    logging:
      driver: "fluentd"
      options:
        tag: cescodemo.log
    environment:
      - PROFILE=develop
      - DBHOST=devdb.cesco.biz
      - DBPORT=11433
      - DBUSERNAME_FILE=/run/secrets/cesnet-api-db-userid
      - DBPASSWORD_FILE=/run/secrets/cesnet-api-db-pass
      # jennifer-agent config
      - JNF_SERVER_ADDRESS=192.168.50.247
      - JNF_SERVER_PORT=5000
      - JNF_DOMAIN_ID=1011
      - JNF_INSTANCE_ID=3201{{.Task.Slot}}
      - JNF_INSTANCE_NAME=cesapi-{{.Task.Slot}}
    secrets:
      - cesnet-api-db-userid
      - cesnet-api-db-pass
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.cesnetapi.loadbalancer.server.port=8080"
        - "traefik.http.routers.cesnetapi.rule=Host(`cesnet3.cesco.biz`) && PathPrefix(`/api/cesnet/`)"
        - "traefik.http.routers.cesnetapi.service=cesnetapi@docker"
        - "traefik.http.middlewares.stripprefix-cesnetapi.stripprefix.prefixes=/api/cesnet"
        - "traefik.http.routers.cesnetapi.middlewares=stripprefix-cesnetapi@docker"
  
networks:
  backend:
    external: true
  proxy:
    external: true
  
secrets:
  cesnet-api-db-userid:
    external: true
  cesnet-api-db-pass:
    external: true
